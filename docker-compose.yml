version: "3.8"

services:
  review-web:
    build: .
    container_name: naver-review-web
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      TZ: KST-9
      REVIEW_OUTPUT_DIR: /app/output
      REVIEW_BROWSER_MODE: edge
    ports:
      - "127.0.0.1:8502:8502"
    volumes:
      - ./output:/app/output
